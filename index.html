<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>File Manager</title>
  
  <!-- এই লাইনটা অ্যাড করবা -->
  <link rel="stylesheet" href="style.css">
  
</head>
<body>
  
  <!-- তোমার ফাইল ম্যানেজারের UI এখানে -->
  <div class="header">
    <h1>📁 My File Manager</h1>
    <div class="search-box">
      <input type="text" placeholder="Search files...">
    </div>
  </div>

  <div class="toolbar">
    <button class="btn">New Folder</button>
    <button class="btn btn-outline">Upload</button>
  </div>

  <div class="file-container">
    <div class="file-item">
      <div class="file-icon">📄</div>
      <div class="file-name">Document.pdf</div>
      <div class="file-meta">2.3 MB</div>
    </div>
    <div class="file-item">
      <div class="file-icon">📁</div>
      <div class="file-name">Photos</div>
      <div class="file-meta">Folder</div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
